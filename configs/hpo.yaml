custom_cnn:
  learning_rate:
    type: log_uniform
    low: 1.0e-4
    high: 1.0e-2
  weight_decay:
    type: log_uniform
    low: 1.0e-5
    high: 1.0e-2
  batch_size:
    type: categorical
    values: [16, 32, 64]
  dropout:
    type: uniform
    low: 0.2
    high: 0.7
  hidden_size:
    type: categorical
    values: [128, 256, 512]

resnet18_head:
  learning_rate:
    type: log_uniform
    low: 1.0e-4
    high: 1.0e-2
  weight_decay:
    type: log_uniform
    low: 1.0e-5
    high: 1.0e-2
  batch_size:
    type: categorical
    values: [16, 32, 64]

resnet18_last_block:
  learning_rate:
    type: log_uniform
    low: 1.0e-5
    high: 1.0e-3
  weight_decay:
    type: log_uniform
    low: 1.0e-5
    high: 1.0e-2
  batch_size:
    type: categorical
    values: [16, 32, 64]

resnet18_full:
  learning_rate:
    type: log_uniform
    low: 1.0e-5
    high: 1.0e-3
  weight_decay:
    type: log_uniform
    low: 1.0e-5
    high: 1.0e-2
  batch_size:
    type: categorical
    values: [16, 32, 64]
